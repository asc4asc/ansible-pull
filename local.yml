---
- name: History of bash for quick use as menu.
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  tasks:
    - name: Copy bash_history
      ansible.builtin.copy:
        src: put2file_bash_history.txt
        dest: /home/ansible/.bash_history
        owner: ansible
        group: ansible
        mode: '0600'
 
    - name: add history bash.
      become: true
      become_user: ansible
      shell: cd /home/ansible && echo 'ls -la' >> .bash_history && echo 'echo "Hello, World!"' >> .bash_history

# May be add a short use with !1 and other history commands.
