---
- name: Harden login for specific Linux user, disable password.
  hosts: localhost
  become: true

  vars:
    target_user: root

  tasks:
    - name: Lock password for user
      ansible.builtin.user:
        name: "{{ target_user }}"
        password_lock: true

    - name: Disable SSH password authentication for user
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        block: |
          Match User {{ target_user }}
              PasswordAuthentication no
      notify: Reload sshd

    - name: Disable root login over SSH completely
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?\s*PermitRootLogin\s+'
        line: 'PermitRootLogin no'
        state: present
        backrefs: false
      notify: Reload sshd    

  handlers:
    - name: Reload sshd
      ansible.builtin.service:
        name: sshd
        state: reloaded
        
