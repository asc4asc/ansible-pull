---
- name: Configure GNOME to never ask for root password (polkit default)
  hosts: localhost
  become: true
  vars:
    admin_users:
      - ekf   # change or override via inventory

    admin_group_map:
      Debian: sudo
      Ubuntu: sudo
      Fedora: wheel
      RedHat: wheel
      Rocky: wheel
      AlmaLinux: wheel

  tasks:
    - name: Determine admin group
      set_fact:
        admin_group: "{{ admin_group_map[ansible_facts.os_family] | default('sudo') }}"

    - name: Ensure admin group exists
      group:
        name: "{{ admin_group }}"
        state: present

    - name: Add users to admin group
      user:
        name: "{{ item }}"
        groups: "{{ admin_group }}"
        append: yes
      loop: "{{ admin_users }}"

    - name: Lock root password (disable root login)
      command: passwd -l root
      changed_when: false

    - name: Create polkit rule for passwordless sudo/admin
      copy:
        dest: /etc/polkit-1/rules.d/49-nopasswd_global.rules
        content: |
          polkit.addRule(function(action, subject) {
              if (subject.isInGroup("{{ admin_group }}")) {
                  return polkit.Result.YES;
              }
          });
        mode: '0644'
