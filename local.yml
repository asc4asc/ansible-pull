---
- name: Install Molecule test environment
  hosts: localhost
  become: true
  tasks:
    - name: Install packages via apt (Debian/Ubuntu)
      apt:
        name:
          - ansible
          - molecule
          - docker.io
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Enable and start Docker
      service:
        name: docker
        state: started
        enabled: true
