---
- name: History of bash for quick use as menu.
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  tasks:
    - name: Copy bash_history
      ansible.builtin.copy:
        src: put2file_bash_history.txt
        dest: /home/ekf/.bash_history
        owner: ekf
        group: ekf
        mode: '0600'
