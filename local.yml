---
- name: Install Molecule test environment
  hosts: localhost
  become: true
  tasks:
    - name: Install system packages (Debian/Ubuntu)
      apt:
        name:
          - ansible
          - pipx
          - docker.io
          - docker-cli
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Enable and start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Install Molecule and plugins via pipx
      command: "pipx install --include-deps molecule[docker]"
      args:
        creates: /root/.local/bin/molecule
      environment:
        PIPX_BIN_DIR: /usr/local/bin
        PIPX_HOME: /opt/pipx
