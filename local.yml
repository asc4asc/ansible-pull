---
- name: Create SSH key (ED25519)
  hosts: localhost
  tasks:
    - name: ED25519 SSH Key erzeugen
      ansible.builtin.openssh_keypair:
        path: ~/.ssh/id_ed25519
        type: ed25519
        comment: "{{ ansible_user }}@{{ inventory_hostname }}"
        mode: '0600'
        state: present
      register: ssh_key

    - name: Display the public key
      debug:
        msg: "{{ ssh_key.public_key }}"
