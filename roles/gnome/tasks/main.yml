---
# --- Verzeichnisse für Zielbenutzer ---
- name: Create autostart directory
  ansible.builtin.file:
    path: "{{ autostart_dir }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0755'

- name: Create Desktop directory
  ansible.builtin.file:
    path: "{{ desktop_dir }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0755'

# --- Autostart GNOME Terminal ---
- name: Deploy GNOME Terminal autostart desktop file
  ansible.builtin.copy:
    dest: "{{ autostart_dir }}/term.desktop"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'
    content: |
      [Desktop Entry]
      Type=Application
      Name=GNOME Terminal
      Exec=gnome-terminal
      OnlyShowIn=GNOME;GNOME-Flashback;
      X-GNOME-Autostart-enabled=true

# --- Desktop Shortcuts ---
- name: Deploy GNOME Terminal desktop file on Desktop
  ansible.builtin.copy:
    dest: "{{ desktop_dir }}/gnome-terminal.desktop"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'
    content: |
      [Desktop Entry]
      Version=1.0
      Name=GNOME Terminal
      Comment=Open the GNOME Terminal
      Exec=gnome-terminal
      Icon=utilities-terminal
      Terminal=false
      Type=Application
      Categories=System;TerminalEmulator;

- name: Deploy GNOME Disks desktop file on Desktop
  ansible.builtin.copy:
    dest: "{{ desktop_dir }}/gnome-DiskUtility.desktop"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'
    content: |
      [Desktop Entry]
      Version=1.0
      Name=GNOME Disks
      Comment=Open GNOME Disks Utility
      Exec=gnome-disks
      Icon=org.gnome.DiskUtility
      Terminal=false
      Type=Application
      Categories=GNOME;GTK;Utility;X-GNOME-Utilities;

# --- GDM Autologin in [daemon]-Section ---
- name: Configure GDM autologin in daemon.conf
  ansible.builtin.blockinfile:
    path: /etc/gdm3/daemon.conf
    marker: "# {mark} ANSIBLE MANAGED AUTOLOGIN"
    block: |
      [daemon]
      AutomaticLoginEnable=True
      AutomaticLogin={{ target_user }}
  notify: restart gdm3

# --- gnome-initial-setup entfernen ---
- name: Ensure gnome-initial-setup is removed
  ansible.builtin.apt:

  - name: Disable logout prompt (for quick shutdown)
  community.general.dconf:
    key: "/org/gnome/SessionManager/logout-prompt"
    value: "false"
    state: present
  become_user: "{{ target_user }}"

- name: Set favorite apps in dock
  community.general.dconf:
    key: "/org/gnome/shell/favorite-apps"
    value: "['org.gnome.Terminal.desktop', 'org.gnome.Nautilus.desktop', 'org.gnome.DiskUtility.desktop']"
    state: present
  become_user: "{{ target_user }}"

- name: Disable idle dimming
  community.general.dconf:
    key: "/org/gnome/settings-daemon/plugins/power/idle-dim"
    value: "false"
    state: present
  become_user: "{{ target_user }}"

- name: Disable idle delay
  community.general.dconf:
    key: "/org/gnome/desktop/session/idle-delay"
    value: "uint32 0"
    state: present
  become_user: "{{ target_user }}"

- name: Disable sleep timeout when plugged in
  community.general.dconf:
    key: "/org/gnome/settings-daemon/plugins/power/sleep-inactive-ac-timeout"
    value: "0"
    state: present
  become_user: "{{ target_user }}"

- name: Disable sleep timeout on battery
  community.general.dconf:
    key: "/org/gnome/settings-daemon/plugins/power/sleep-inactive-battery-timeout"
    value: "0"
    state: present
  become_user: "{{ target_user }}"

- name: Set power button action to interactive
  community.general.dconf:
    key: "/org/gnome/settings-daemon/plugins/power/power-button-action"
    value: "'interactive'"
    state: present
  become_user: "{{ target_user }}"

- name: Disable screensaver idle activation
  community.general.dconf:
    key: "/org/gnome/desktop/screensaver/idle-activation-enabled"
    value: "false"
    state: present
  become_user: "{{ target_user }}"

- name: Set screensaver lock delay to 0
  community.general.dconf:
    key: "/org/gnome/desktop/screensaver/lock-delay"
    value: "uint32 0"
    state: present
  become_user: "{{ target_user }}"

- name: Disable screen lock
  community.general.dconf:
    key: "/org/gnome/desktop/screensaver/lock-enabled"
    value: "false"
    state: present
  become_user: "{{ target_user }}"
    name: gnome-initial-setup
    state: absent
